events {}

http {
    limit_req_zone $binary_remote_addr zone=apilimit:10m rate=10r/s;
    resolver 127.0.0.11 valid=30s ipv6=off;

    upstream api {
        zone api 64k;
        server chatbot-api:8000 resolve;
    }
    upstream mcp {
        zone mcp 64k;
        server mcp-server:9000 resolve;
    }
    upstream grafana {
        zone grafana 64k;
        server grafana:3000 resolve;
    }

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/chat {
            limit_req zone=apilimit burst=20 nodelay;
            proxy_pass http://api/chat;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/ {
            proxy_pass http://api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /auth/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
        }

        location /chat {
            proxy_pass http://api/chat;
            proxy_set_header Host $host;
        }

        location /healthz { proxy_pass http://api/healthz; }
        location /docs { proxy_pass http://api/docs; }
        location /openapi.json { proxy_pass http://api/openapi.json; }
        location /topics { proxy_pass http://api/topics; }
        location /me { proxy_pass http://api/me; }

        location = /mcp { return 301 /mcp/sse; }
        location = /mcp/ { return 301 /mcp/sse; }
        location /mcp/ { proxy_pass http://mcp/; }

        location /grafana/ {
            proxy_pass http://grafana/;
            proxy_set_header Host $host;
        }
    }
}
